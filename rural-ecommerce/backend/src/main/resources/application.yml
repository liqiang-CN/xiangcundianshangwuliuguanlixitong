server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: rural-ecommerce

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}

  datasource:
    url: jdbc:mysql://${MYSQLHOST:${DB_HOST:gateway01.ap-northeast-1.prod.aws.tidbcloud.com}}:${MYSQLPORT:${DB_PORT:4000}}/${MYSQLDATABASE:${DB_NAME:rural_ecommerce}}?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${MYSQLUSER:${DB_USERNAME:2jL5NxZffj5nkj9.root}}
    password: ${MYSQLPASSWORD:${DB_PASSWORD:TuuHJhItgkPl5a0W}}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 20000

  redis:
    host: ${REDISHOST:${REDIS_HOST:localhost}}
    port: ${REDISPORT:${REDIS_PORT:6379}}
    password: ${REDISPASSWORD:${REDIS_PASSWORD:}}
    database: 0
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

  web:
    resources:
      static-locations: classpath:/static/,file:./uploads/

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.rural.ecommerce.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 文件上传配置
file:
  upload:
    path: uploads/
    url: /uploads/

jwt:
  secret: rural-ecommerce-secret-key-2024
  expiration: 86400000

logging:
  level:
    com.rural.ecommerce: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"
