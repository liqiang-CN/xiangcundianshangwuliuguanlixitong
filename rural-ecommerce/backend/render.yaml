# Render 免费部署配置
# 在 Render 网站连接此仓库后，使用此文件自动配置

services:
  - type: web
    name: rural-ecommerce-backend
    env: java
    region: oregon  # 免费用户可选区域
    plan: free
    buildCommand: ""
    startCommand: java -jar target/rural-ecommerce-1.0.0.jar
    healthCheckPath: /api/health
    envVars:
      - key: DB_HOST
        value: 待填写（TiDB 连接地址）
      - key: DB_PORT
        value: 4000
      - key: DB_NAME
        value: rural_ecommerce
      - key: DB_USERNAME
        value: 待填写（TiDB 用户名）
      - key: DB_PASSWORD
        value: 待填写（TiDB 密码）
      - key: REDIS_HOST
        value: 待填写（Upstash Redis 地址）
      - key: REDIS_PORT
        value: 6379
      - key: REDIS_PASSWORD
        value: 待填写（Upstash Redis 密码）
